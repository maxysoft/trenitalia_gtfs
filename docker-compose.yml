x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: 10m
      max-file: "3"

x-resources: &resources
  mem_limit: 64M
  cpus: '0.3'

services:
  bot-trenitalia:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: bot-trenitalia
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Europe/Rome
      - SQLITE_DB_PATH=${SQLITE_DB_PATH:-/data/ritardi.sqlite}
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID:-}
    volumes:
      - ritardi-data:/data
    <<: [*logging, *resources]

  ritardi-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: trenitalia-ritardi-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Europe/Rome
      - SQLITE_DB_PATH=${SQLITE_DB_PATH:-/data/ritardi.sqlite}
      - WEB_BIND_ADDR=0.0.0.0
      - WEB_PORT=${WEB_PORT:-8080}
      - WEB_PAGE_SIZE=${WEB_PAGE_SIZE:-25}
    ports:
      - "${WEB_PORT:-8080}:${WEB_PORT:-8080}"
    volumes:
      - ritardi-data:/data:ro
    depends_on:
      - bot-trenitalia
    <<: [*logging, *resources]

volumes:
  ritardi-data: